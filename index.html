<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blue Berry's The Vintage Restaurant</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #0f0f0f;
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  position: fixed;
  width: 100%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 28px;
  color: #ffcc70;
}

nav ul {
  display: flex;
  list-style: none;
}

nav ul li {
  margin-left: 25px;
}

nav ul li a {
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

nav ul li a:hover {
  color: #ffcc70;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1541542684-4a47d0e3b0b3') no-repeat center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero-content {
  background: rgba(0,0,0,0.6);
  padding: 40px;
  border-radius: 15px;
}

.hero h1 {
  font-size: 55px;
  font-family: 'Cinzel', serif;
  color: #ffcc70;
}

.hero p {
  margin: 20px 0;
  font-size: 18px;
}

/* BUTTON */
.btn {
  background: linear-gradient(45deg, #ff4d4d, #ffcc70);
  padding: 12px 25px;
  border-radius: 25px;
  text-decoration: none;
  color: black;
  font-weight: bold;
}

.btn:hover {
  opacity: 0.8;
}

/* SECTION */
.section {
  padding: 80px 20px;
  text-align: center;
}

/* MENU GRID */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #1a1a1a;
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 100%;
}

.card h3 {
  margin: 10px;
  color: #ffcc70;
}

/* FOOTER */
footer {
  background: black;
  padding: 20px;
  text-align: center;
  color: #aaa;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">Blue Berry's</div>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="menu.html">Menu</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>The Vintage Experience</h1>
    <p>Luxury Dining • Timeless Taste 🍷</p>
    <a href="menu.html" class="btn">Explore Menu</a>
  </div>
</div>

<!-- ABOUT -->
<div class="section">
  <h2>About Us</h2>
  <p>We bring you a perfect blend of vintage ambience and modern cuisine.</p>
</div>

<!-- MENU -->
<div class="section">
  <h2>Popular Dishes</h2>
  <div class="menu">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
      <h3>Pizza</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1589302168068-964664d93dc0">
      <h3>Pasta</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b">
      <h3>Mocktails</h3>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Blue Berry's The Vintage Restaurant</p>
</footer>

</body>
</html>
