<!DOCTYPE html>

<title>Blue Berry's The Vintage Restaurant</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #faf3e0;
}

/* Header */
header {
  background: linear-gradient(45deg, #8b0000, #ff4d4d);
  color: white;
  padding: 30px;
  text-align: center;
  font-family: 'Playfair Display', serif;
}

/* Navigation */
nav {
  background: #222;
  padding: 12px;
  text-align: center;
}

nav a {
  color: white;
  margin: 15px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

nav a:hover {
  color: #ffcccb;
}

/* Hero Section */
.hero {
  padding: 40px;
  text-align: center;
}

.hero img {
  width: 80%;
  max-width: 600px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* Button */
button {
  background: #8b0000;
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff4d4d;
  transform: scale(1.05);
}

/* Footer */
footer {
  background: #222;
  color: white;
  text-align: center;
  padding: 15px;
  margin-top: 30px;
}
</style>

</head>

<header>
  <h1>Blue Berry's</h1>
  <p>The Vintage Restaurant</p>
</header>

<nav>
  <a href="index.html">Home</a>

</nav>

  <p>Enjoy delicious meals with classic ambience</p>

  <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5" alt="Restaurant Image">

  <br><br>

  <a href="menu.html">
    <button>View Menu</button>
  </a>
</div>

<footer>
  <p>© 2026 Blue Berry's The Vintage Restaurant</p>
</footer>
